services:
  main-db:
    image: mysql:8
    container_name: payment_main_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
      MYSQL_USER: payment_user
      MYSQL_PASSWORD: '123654'
    ports:
      - '3306:3306'
    expose:
      - '3306'
    volumes:
      - ./data/db:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 5s
      timeout: 5s
      retries: 10
  gateways:
    image: matheusprotzen/gateways-mock
    container_name: payment_gateways
    restart: always
    ports:
      - '3001:3001'
      - '3002:3002'
  app:
    build: .
    container_name: payment_app
    restart: always
    ports:
      - '3333:3333'
    env_file:
      - .env
    environment:
      MYSQL_HOST: main-db
      GATEWAY1_URL: http://gateways:3001
      GATEWAY2_URL: http://gateways:3002
    depends_on:
      main-db:
        condition: service_healthy
      gateways:
        condition: service_started
    command: sh -c "node ace migration:run --force && node ace db:seed && node bin/server.js"
